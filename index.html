<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>玉界</title>
<link rel="stylesheet" href="css/global.css?v=3.11">
<link rel="stylesheet" href="css/settings.css?v=3.11">
<link rel="stylesheet" href="css/beautify.css?v=3.11">
<link rel="stylesheet" href="css/diary.css?v=3.11">
<link rel="stylesheet" href="css/worldbook.css?v=3.11">
<link rel="stylesheet" href="css/shiyilin.css?v=3.11">
<link rel="stylesheet" href="css/qianban.css?v=3.11">
<link rel="stylesheet" href="css/gallery.css?v=3.11">
<link rel="stylesheet" href="css/qawenda.css?v=3.11">
<link rel="stylesheet" href="css/chat.css?v=3.11">
<link rel="stylesheet" href="css/music.css?v=3.11">
<link rel="stylesheet" href="css/accounting.css?v=3.11">
</head>
<body>

<div class="phone-screen" id="desktop">
    <div id="topStatusBar" style="position:fixed; top:12px; left:20px; font-size:15px; font-weight:500; color:#000; z-index:999; pointer-events:none;">14:30</div>
    <div id="topStatusRight" style="position:fixed; top:12px; right:20px; z-index:999; pointer-events:none;">
        <div style="display:flex; gap:6px; align-items:center; font-size:14px;">
            <span class="signal-icon">
                <span class="signal-bar"></span>
                <span class="signal-bar"></span>
                <span class="signal-bar"></span>
                <span class="signal-bar"></span>
            </span>
            <span class="battery-icon" id="batteryIcon">
                <span class="battery-body">
                    <span class="battery-fill"></span>
                    <span class="battery-lightning"></span>
                    <span class="battery-percent" id="batteryPercent">80%</span>
                </span>
                <span class="battery-cap"></span>
            </span>
        </div>
    </div>

    <div class="desktop-pages" id="desktopPages" onscroll="updatePageIndicator()">
        <div class="desktop-page" id="page1"></div>
        <div class="desktop-page" id="page2">
            <div class="page2-shortcuts" id="page2Shortcuts"></div>
        </div>
    </div>

    <div class="page-indicator">
        <div class="page-dot active" id="dot1"></div>
        <div class="page-dot" id="dot2"></div>
    </div>

    <div class="dock-wrapper">
        <div class="dock liquid-glass" id="dockBar"></div>
    </div>

    <div id="modalContainer"></div>
</div>

<script src="js/modal.js?v=3.11"></script>
<script src="js/desktop.js?v=3.11"></script>
<script src="js/settings.js?v=3.11"></script>
<script src="js/beautify.js?v=3.11"></script>
<script src="js/diary.js?v=3.11"></script>
<script src="js/worldbook.js?v=3.11"></script>
<script src="js/shiyilin.js?v=3.11"></script>
<script src="js/qianban.js?v=3.11"></script>
<script src="js/gallery.js?v=3.11"></script>
<script src="js/qawenda.js?v=3.11"></script>
<script src="js/chat_core.js?v=3.11"></script>
<script src="js/chat_ui.js?v=3.11"></script>
<script src="js/chat_addons.js?v=3.11"></script>
<script src="js/music.js?v=3.11"></script>
<script src="js/accounting.js?v=3.11"></script>

</body>
</html>
